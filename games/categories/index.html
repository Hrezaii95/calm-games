<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Categories — The Calm Corner</title>
<link rel="stylesheet" href="../../assets/fonts/fonts.css">
<link rel="stylesheet" href="../../assets/fonts/fonts-cute.css">
<style>
:root{
  --paper:#FBF1E3;
  --paper-deep:#F3E4CE;
  --card:#FFFDF7;
  --card-bv:#E3D2B8;
  --ink:#5C4433;
  --ink-soft:#8A6F5C;
  --line:rgba(92,68,51,.14);
  --caramel:#C97B52;
  --caramel-deep:#9E5A38;
  --on-caramel:#FFF4EA;
  --sage:#CFE0CB; --sage-bv:#A3BC9E; --sage-ink:#395231;
  --r-tile:20px; --r-ui:14px;
  --bevel:5px;
  --dur:260ms;
  --display:'Baloo 2', Nunito, "Segoe UI", system-ui, sans-serif;
  --sans:Nunito, "Segoe UI", system-ui, sans-serif;
}
*{box-sizing:border-box;margin:0}
body{
  background:var(--paper);
  color:var(--ink);
  font:400 20px/1.6 var(--sans);
  min-height:100vh;
}
.wrap{max-width:720px;margin:0 auto;padding:24px 24px 120px;text-align:center}
.eyebrow{display:inline-block;background:rgba(201,123,82,.14);color:var(--caramel);
  font:700 14px/1 var(--sans);padding:8px 14px;border-radius:999px}
h1{font-family:var(--display);font-weight:700;font-size:clamp(40px,9vw,76px);line-height:1.04;margin:10px 0 8px;color:var(--ink)}
.sub{color:var(--ink-soft);font-size:20px;max-width:48ch;margin:0 auto 26px}
.word-card{position:relative;background:var(--card);border:2px solid var(--line);border-bottom:6px solid var(--card-bv);border-radius:22px;
  padding:56px 24px;margin-bottom:22px;min-height:220px;display:flex;flex-direction:column;justify-content:center;gap:14px;color:var(--ink)}
#cat{font-family:var(--display);font-weight:700;font-size:clamp(34px,7vw,52px);line-height:1.1;color:var(--ink)}
#letterRow{display:flex;align-items:center;justify-content:center;gap:12px}
#letterLabel{color:var(--ink-soft);font-size:19px;font-weight:600}
#letter{font-family:var(--display);font-weight:700;font-size:clamp(48px,10vw,72px);color:var(--sage-ink);line-height:1;
  background:var(--sage);border:2px solid var(--line);border-bottom:var(--bevel) solid var(--sage-bv);border-radius:var(--r-ui);padding:6px 20px 8px}
#timer{font-family:var(--display);font-size:44px;font-weight:700;color:var(--sage-ink);min-height:52px;margin-top:10px}
.btn{display:inline-block;background:var(--caramel);color:var(--on-caramel);border:0;border-bottom:4px solid var(--caramel-deep);
  font:700 20px var(--sans);padding:16px 34px;min-height:56px;border-radius:999px;cursor:pointer;width:100%;max-width:360px}
.ghost{background:var(--paper);border:2px solid var(--caramel);border-bottom-width:4px;color:var(--ink);font:700 18px var(--sans);
  padding:12px 22px;min-height:48px;border-radius:999px;cursor:pointer;margin-top:14px}
.ghost:hover{background:rgba(201,123,82,.12)}
.btn:focus-visible,.ghost:focus-visible,a:focus-visible{outline:3px solid var(--caramel);outline-offset:3px}
@media (prefers-reduced-motion:no-preference){
  @view-transition{navigation:auto}
  ::view-transition-old(root){animation:vt-out 200ms ease both}
  ::view-transition-new(root){animation:vt-in 260ms ease both}
  @keyframes vt-out{to{opacity:0;transform:translateY(8px)}}
  @keyframes vt-in{from{opacity:0;transform:translateY(-8px)}}
  .btn,.ghost{transition:transform var(--dur) cubic-bezier(.34,1.56,.64,1),border-bottom-width 120ms ease,background-color var(--dur) ease}
  .btn:hover,.ghost:hover{transform:translateY(-2px)}
  .btn:active{transform:translateY(2px);border-bottom-width:1px}
  .ghost:active{transform:translateY(2px);border-bottom-width:2px}
}

.eyebrow{display:inline-flex;align-items:center;gap:9px}
.eyebrow::before{content:"";flex:none;width:26px;height:24px;background:url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 44 40'><g stroke='%235C4433' stroke-width='2.5' stroke-linejoin='round'><path d='M10 17 L5 4 L19 9 Z' fill='%23F6E7D3'/><path d='M34 17 L39 4 L25 9 Z' fill='%23F6E7D3'/></g><path d='M11 12.5 L8.5 6.5 L15 9 Z' fill='%23F5CCB5'/><path d='M33 12.5 L35.5 6.5 L29 9 Z' fill='%23F5CCB5'/><circle cx='22' cy='23' r='15' fill='%23F6E7D3' stroke='%235C4433' stroke-width='2.5'/><path d='M24 9.5 Q31 10.5 34 15.5 Q27.5 18 23 14.5 Z' fill='%23E8B583'/><circle cx='16.5' cy='22' r='2' fill='%235C4433'/><circle cx='27.5' cy='22' r='2' fill='%235C4433'/><path d='M20.4 27 L23.6 27 L22 29.6 Z' fill='%235C4433'/><g stroke='%235C4433' stroke-width='1.6' stroke-linecap='round'><path d='M3 20 L11 23'/><path d='M2 26 L11 26'/><path d='M3 32 L11 29'/><path d='M41 20 L33 23'/><path d='M42 26 L33 26'/><path d='M41 32 L33 29'/></g></svg>") center/contain no-repeat}
</style>
</head>
<body>
<main class="wrap">
  <p class="eyebrow">Play together · 3+ players</p>
  <h1>Categories</h1>
  <p class="sub">Everyone writes an answer for the category that starts with the letter shown. Unique answers score a point — matching answers score nothing.</p>

  <div class="word-card">
    <div id="cat">Ready?</div>
    <div id="letterRow">
      <span id="letterLabel">Letter</span>
      <span id="letter">—</span>
    </div>
    <div id="timer" aria-live="polite"></div>
  </div>

  <button class="btn" id="next">New round</button><br>
  <button class="ghost" id="timerToggle" aria-pressed="false">Timer: off</button>
</main>
<a href="../../index.html#games" data-lobby-fixed onclick="location.href='../../index.html#games'" ontouchend="event.preventDefault();event.stopPropagation();location.href='../../index.html#games'" style="position:fixed;left:16px;bottom:16px;z-index:99999;background:#FBF1E3;color:#5C4433;font:700 17px/1 'Baloo 2',Nunito,system-ui;padding:14px 20px;border:2px solid #C97B52;border-bottom-width:4px;border-radius:999px;text-decoration:none;min-height:48px;display:inline-flex;align-items:center">⌂ Lobby</a>

<script>
"use strict";
const CATEGORIES = [
  "Fruits","Vegetables","Things in a kitchen","Countries","Cities","Jobs","Animals",
  "Things that are cold","Things that are round","Board games","Sports","School subjects",
  "Things you pack for a trip","Drinks","Desserts","Colors","Flowers","Trees",
  "Things found at the beach","Weather words","Musical instruments","Movie genres",
  "Things in a garage","Things in a bathroom","Modes of transport","Farm animals",
  "Things that fly","Superheroes","Cartoon characters","Card games","Breakfast foods",
  "Things in a backpack","Household chores","Types of shoes","Things at a party",
  "Ice cream flavors","Things in space","Kitchen appliances","Camping gear",
  "Things you find in a park","Types of hats","Things that make noise","Names of rivers",
  "Types of bread","Things in an office","Winter activities","Summer activities",
  "Things with wheels","Types of pasta"
];
const LETTERS = "ABCDEFGHIJKLMNOPRSTUVWY".split(""); // excludes Q, X, Z

const catEl = document.getElementById("cat"), letterEl = document.getElementById("letter");
let recentCats = [], recentLetters = [];

function pick(list, recent, maxRecent) {
  const pool = list.filter(item => !recent.includes(item));
  const choice = pool.length ? pool[Math.floor(Math.random() * pool.length)]
                             : list[Math.floor(Math.random() * list.length)];
  recent.push(choice);
  if (recent.length > maxRecent) recent.shift();
  return choice;
}

function newRound() {
  const cat = pick(CATEGORIES, recentCats, Math.min(15, CATEGORIES.length - 1));
  const letter = pick(LETTERS, recentLetters, Math.min(6, LETTERS.length - 1));
  catEl.textContent = cat;
  letterEl.textContent = letter;
  if (timerOn) startTimer();
}
document.getElementById("next").addEventListener("click", newRound);

const timerEl = document.getElementById("timer"), toggle = document.getElementById("timerToggle");
let timerOn = false, tick = null;
const TIMER_SECONDS = 90;
function stopTimer(){ clearInterval(tick); tick = null; timerEl.textContent = ""; }
function startTimer(){
  stopTimer();
  let left = TIMER_SECONDS;
  timerEl.textContent = left + "s";
  tick = setInterval(() => {
    left--;
    timerEl.textContent = left > 0 ? left + "s" : "Time!";
    if (left <= 0) clearInterval(tick);
  }, 1000);
}
toggle.addEventListener("click", () => {
  timerOn = !timerOn;
  toggle.textContent = "Timer: " + (timerOn ? TIMER_SECONDS + "s" : "off");
  toggle.setAttribute("aria-pressed", String(timerOn));
  if (!timerOn) stopTimer();
});
</script>
</body>
</html>
