<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Would You Rather — The Calm Corner</title>
<link rel="stylesheet" href="../../assets/fonts/fonts.css">
<link rel="stylesheet" href="../../assets/fonts/fonts-cute.css">
<style>
:root{
  /* Paper */
  --paper:#FBF1E3;
  --paper-deep:#F3E4CE;
  --card:#FFFDF7;
  /* Ink */
  --ink:#5C4433;
  --ink-soft:#8A6F5C;
  --line:rgba(92,68,51,.14);
  /* Brand */
  --caramel:#C97B52;
  --caramel-deep:#9E5A38;
  --on-caramel:#FFF4EA;
  /* Page accent pair: rose */
  --rose:#F3CDD3; --rose-bv:#D19FA8; --rose-ink:#7E3541;
  --r-tile:20px; --r-ui:14px;
  --bevel:5px;
  --dur:260ms;
  --display:'Baloo 2', Nunito, "Segoe UI", system-ui, sans-serif;
  --sans:Nunito, "Segoe UI", system-ui, sans-serif;
}
*{box-sizing:border-box;margin:0}
body{
  background:var(--paper);
  color:var(--ink);
  font:400 20px/1.6 var(--sans);
  min-height:100vh;
}
.wrap{max-width:760px;margin:0 auto;padding:24px 24px 120px;text-align:center}
.eyebrow{display:inline-block;font:700 14px/1 var(--sans);color:var(--caramel);
  background:rgba(201,123,82,.14);padding:8px 14px;border-radius:999px}
h1{font-family:var(--display);font-weight:700;font-size:clamp(40px,9vw,76px);line-height:1.04;margin:10px 0 8px;color:var(--ink)}
.sub{color:var(--ink-soft);font-size:20px;max-width:52ch;margin:0 auto 26px}
.stage{display:flex;flex-direction:column;gap:16px;margin-bottom:22px}
.option{position:relative;background:var(--card);border:2px solid var(--line);
  border-bottom:6px solid #E3D2B8;border-radius:22px;
  padding:32px 24px;min-height:150px;display:flex;flex-direction:column;justify-content:center;gap:10px;color:var(--ink)}
.option .tag{align-self:center;font:700 18px/1 var(--sans);color:var(--rose-ink);
  background:var(--rose);border:2px solid var(--rose-bv);border-radius:999px;padding:7px 14px}
.option .txt{font-family:var(--display);font-weight:700;font-size:clamp(24px,5vw,32px);line-height:1.15;color:var(--ink)}
.or{font:700 19px var(--sans);color:var(--ink-soft)}
@media (min-width:640px){
  .stage{flex-direction:row;align-items:stretch}
  .option{flex:1}
  .or{display:flex;align-items:center;justify-content:center;padding:0 6px}
}
.btn{display:inline-block;background:var(--caramel);color:var(--on-caramel);border:0;
  border-bottom:4px solid var(--caramel-deep);font:700 20px var(--sans);
  padding:18px 34px;min-height:56px;border-radius:999px;cursor:pointer;width:100%;max-width:360px}
.btn:focus-visible{outline:3px solid var(--caramel);outline-offset:3px}
a[href="../../index.html#games"]:focus-visible{outline:3px solid var(--caramel);outline-offset:3px}
@media (prefers-reduced-motion:no-preference){
  .btn{transition:transform 260ms cubic-bezier(.34,1.56,.64,1),border-bottom-width 120ms ease}
  .btn:hover{transform:translateY(-2px);border-bottom-width:6px}
  .btn:active{transform:translateY(2px);border-bottom-width:1px}
  @view-transition{navigation:auto}
  ::view-transition-old(root){animation:vt-out 200ms ease both}
  ::view-transition-new(root){animation:vt-in 260ms ease both}
  @keyframes vt-out{to{opacity:0;transform:translateY(8px)}}
  @keyframes vt-in{from{opacity:0;transform:translateY(-8px)}}
}

.eyebrow{display:inline-flex;align-items:center;gap:9px}
.eyebrow::before{content:"";flex:none;width:26px;height:24px;background:url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 44 40'><g stroke='%235C4433' stroke-width='2.5' stroke-linejoin='round'><path d='M10 17 L5 4 L19 9 Z' fill='%23F6E7D3'/><path d='M34 17 L39 4 L25 9 Z' fill='%23F6E7D3'/></g><path d='M11 12.5 L8.5 6.5 L15 9 Z' fill='%23F5CCB5'/><path d='M33 12.5 L35.5 6.5 L29 9 Z' fill='%23F5CCB5'/><circle cx='22' cy='23' r='15' fill='%23F6E7D3' stroke='%235C4433' stroke-width='2.5'/><path d='M24 9.5 Q31 10.5 34 15.5 Q27.5 18 23 14.5 Z' fill='%23E8B583'/><circle cx='16.5' cy='22' r='2' fill='%235C4433'/><circle cx='27.5' cy='22' r='2' fill='%235C4433'/><path d='M20.4 27 L23.6 27 L22 29.6 Z' fill='%235C4433'/><g stroke='%235C4433' stroke-width='1.6' stroke-linecap='round'><path d='M3 20 L11 23'/><path d='M2 26 L11 26'/><path d='M3 32 L11 29'/><path d='M41 20 L33 23'/><path d='M42 26 L33 26'/><path d='M41 32 L33 29'/></g></svg>") center/contain no-repeat}
</style>
</head>
<body>
<main class="wrap">
  <p class="eyebrow">Play together · 3+ players</p>
  <h1>Would You Rather</h1>
  <p class="sub">Read the question aloud. Everyone picks a side — A or B — then take turns defending your choice.</p>

  <div class="stage">
    <div class="option">
      <span class="tag">Option A</span>
      <span class="txt" id="optA">Tap the button below</span>
    </div>
    <div class="or">or</div>
    <div class="option">
      <span class="tag">Option B</span>
      <span class="txt" id="optB">to begin</span>
    </div>
  </div>

  <button class="btn" id="next">Next question</button>
</main>
<a href="../../index.html#games" data-lobby-fixed onclick="location.href='../../index.html#games'" ontouchend="event.preventDefault();event.stopPropagation();location.href='../../index.html#games'" style="position:fixed;left:16px;bottom:16px;z-index:99999;background:#FBF1E3;color:#5C4433;font:700 17px/1 'Baloo 2',Nunito,system-ui;padding:14px 20px;border:2px solid #C97B52;border-bottom-width:4px;border-radius:999px;text-decoration:none;min-height:48px;display:inline-flex;align-items:center">⌂ Lobby</a>

<script>
"use strict";
const PAIRS = [
  ["Always have summer weather","Always have spring weather"],
  ["Never wait in line again","Never lose your keys again"],
  ["Have a garden that never needs weeding","Have a car that never needs washing"],
  ["Always know the right thing to say","Always know the right thing to do"],
  ["Take naps that always feel refreshing","Have coffee that always tastes perfect"],
  ["Never run out of your favorite book","Never run out of your favorite snack"],
  ["Live somewhere with mild winters","Live somewhere with mild summers"],
  ["Always find a good parking spot","Always find a good seat"],
  ["Have a hammock in every backyard","Have a porch swing on every porch"],
  ["Never get a paper cut again","Never stub your toe again"],
  ["Always wake up before your alarm","Always fall asleep the moment you lie down"],
  ["Have perfect handwriting","Have a perfect memory for names"],
  ["Get to relive one favorite trip","Get to plan one brand-new trip, fully paid"],
  ["Have a bottomless bird feeder","Have a bottomless fruit bowl"],
  ["Always have fresh-baked bread at home","Always have fresh-cut flowers at home"],
  ["Know exactly when it will rain","Know exactly when it will be sunny"],
  ["Never lose a game of cards again","Never lose the TV remote again"],
  ["Have a house with a porch","Have a house with a big backyard"],
  ["Always get the crossword answer instantly","Always win at trivia night"],
  ["Have a lifetime supply of stamps","Have a lifetime supply of greeting cards"],
  ["Take one long walk every day","Take three short walks every day"],
  ["Always have the right umbrella on hand","Always have the right sweater on hand"],
  ["Get a new houseplant every month","Get a new photo album every month"],
  ["Have Sunday dinners with family every week","Have a game night with friends every week"],
  ["Always find the best deal at the store","Always find a good parking spot at the store"],
  ["Never forget a birthday again","Never forget an appointment again"],
  ["Have a kitchen that always smells like cookies","Have a kitchen that always smells like coffee"],
  ["Only ever watch classic movies","Only ever listen to classic music"],
  ["Always have the newspaper delivered warm from the sun","Always have your coffee at the perfect temperature"],
  ["Be excellent at chess","Be excellent at cards"],
  ["Have a garden full of vegetables","Have a garden full of flowers"],
  ["Get to pick the restaurant every time","Get to pick the movie every time"],
  ["Always have neat handwriting on cards","Always remember everyone's birthday"],
  ["Live near the mountains","Live near the sea"],
  ["Have an extra hour every morning","Have an extra hour every evening"],
  ["Always find loose change on the ground","Always find a good parking spot downtown"],
  ["Never have a bad hair day","Never have a wrinkled shirt"],
  ["Have a porch that faces the sunrise","Have a porch that faces the sunset"],
  ["Be able to fix anything around the house","Be able to grow anything in the garden"],
  ["Take the scenic route everywhere","Take the fastest route everywhere"],
  ["Always have the right recipe on hand","Always have the right tool on hand"],
  ["Get to relive your favorite year","Get to skip ahead and see next year"],
  ["Have a puzzle that never runs out of pieces","Have a deck of cards that never gets lost"],
  ["Wake up to birdsong every morning","Wake up to the smell of fresh bread every morning"],
  ["Never misplace your glasses again","Never misplace your phone again"],
  ["Always have the perfect nap spot","Always have the perfect reading chair"],
  ["Have unlimited postage stamps","Have unlimited notebook paper"],
  ["Host the holidays every year","Travel somewhere new every holiday"],
  ["Always get a table by the window","Always get a table near the fireplace"],
  ["Have a clock that's always exactly right","Have a calendar that's always up to date"]
];

const optA = document.getElementById("optA"), optB = document.getElementById("optB");
let recent = [];
function newQuestion() {
  const pool = [];
  for (let i = 0; i < PAIRS.length; i++) if (!recent.includes(i)) pool.push(i);
  const idx = pool.length ? pool[Math.floor(Math.random() * pool.length)]
                          : Math.floor(Math.random() * PAIRS.length);
  recent.push(idx);
  if (recent.length > Math.min(20, PAIRS.length - 1)) recent.shift();
  const [a, b] = PAIRS[idx];
  optA.textContent = a;
  optB.textContent = b;
}
document.getElementById("next").addEventListener("click", newQuestion);
</script>
</body>
</html>
