<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Draw &amp; Guess — The Calm Corner</title>
<link rel="stylesheet" href="../../assets/fonts/fonts.css">
<link rel="stylesheet" href="../../assets/fonts/fonts-cute.css">
<style>
:root{
  --paper:#FBF1E3;
  --paper-deep:#F3E4CE;
  --card:#FFFDF7;
  --ink:#5C4433;
  --ink-soft:#8A6F5C;
  --line:rgba(92,68,51,.14);
  --caramel:#C97B52;
  --caramel-deep:#9E5A38;
  --on-caramel:#FFF4EA;
  --plum:#E5D3E8; --plum-bv:#BFA3C4; --plum-ink:#5C3866;
  --card-bv:#E3D2B8;
  --r-tile:20px; --r-ui:14px;
  --bevel:5px;
  --dur:260ms;
  --display:'Baloo 2', Nunito, "Segoe UI", system-ui, sans-serif;
  --sans:Nunito, "Segoe UI", system-ui, sans-serif;
}
*{box-sizing:border-box;margin:0}
body{
  background:var(--paper);
  color:var(--ink);
  font:400 20px/1.6 var(--sans);
  min-height:100vh;
}
.wrap{max-width:720px;margin:0 auto;padding:24px 24px 120px;text-align:center}
.eyebrow{display:inline-block;font:700 14px/1.4 var(--sans);letter-spacing:normal;text-transform:none;
  color:var(--caramel);background:rgba(201,123,82,.14);border-radius:999px;padding:8px 16px}
h1{font-family:var(--display);font-weight:700;font-size:clamp(40px,9vw,76px);line-height:1.04;margin:12px 0 8px;color:var(--ink)}
.sub{color:var(--ink-soft);font-size:20px;max-width:46ch;margin:0 auto 26px}
.chips{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-bottom:26px}
.chip{font:700 18px var(--sans);color:var(--ink);background:var(--card);border:2px solid var(--line);
  border-radius:999px;padding:11px 20px;min-height:48px;cursor:pointer}
.chip:hover{background:var(--plum);border-color:var(--plum-bv);color:var(--plum-ink)}
.chip:active{transform:translateY(2px)}
.chip[aria-pressed="true"]{background:var(--caramel);border-color:var(--caramel);color:var(--on-caramel);font-weight:700}
.chip:focus-visible,.btn:focus-visible,a:focus-visible{outline:3px solid var(--caramel);outline-offset:3px}
.word-card{position:relative;background:var(--card);border:2px solid var(--line);border-bottom:6px solid var(--card-bv);
  border-radius:22px;padding:56px 24px;margin-bottom:22px;min-height:220px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--ink)}
#word{font-family:var(--display);font-weight:700;font-size:clamp(40px,9vw,64px);line-height:1.1;color:var(--ink)}
#cat{font:700 19px/1.4 var(--sans);color:var(--plum-ink);background:var(--plum);
  border:2px solid var(--plum-bv);border-radius:999px;padding:6px 18px}
.btn{display:inline-block;background:var(--caramel);color:var(--on-caramel);border:0;
  border-bottom:4px solid var(--caramel-deep);font:700 20px var(--sans);
  padding:18px 34px;min-height:56px;border-radius:999px;cursor:pointer;width:100%;max-width:360px}
.btn:hover{transform:translateY(-2px);border-bottom-width:6px}
.btn:active{transform:translateY(2px);border-bottom-width:1px}
.hint{color:var(--ink-soft);font-size:19px;margin-top:16px}
@media (prefers-reduced-motion:no-preference){
  .chip,.btn{transition:transform var(--dur) cubic-bezier(.34,1.56,.64,1),border-bottom-width 120ms ease,
    background var(--dur) ease,border-color var(--dur) ease,color var(--dur) ease}
  @view-transition{navigation:auto}
  ::view-transition-old(root){animation:vt-out 200ms ease both}
  ::view-transition-new(root){animation:vt-in 260ms ease both}
  @keyframes vt-out{to{opacity:0;transform:translateY(8px)}}
  @keyframes vt-in{from{opacity:0;transform:translateY(-8px)}}
}

.eyebrow{display:inline-flex;align-items:center;gap:9px}
.eyebrow::before{content:"";flex:none;width:26px;height:24px;background:url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 44 40'><g stroke='%235C4433' stroke-width='2.5' stroke-linejoin='round'><path d='M10 17 L5 4 L19 9 Z' fill='%23F6E7D3'/><path d='M34 17 L39 4 L25 9 Z' fill='%23F6E7D3'/></g><path d='M11 12.5 L8.5 6.5 L15 9 Z' fill='%23F5CCB5'/><path d='M33 12.5 L35.5 6.5 L29 9 Z' fill='%23F5CCB5'/><circle cx='22' cy='23' r='15' fill='%23F6E7D3' stroke='%235C4433' stroke-width='2.5'/><path d='M24 9.5 Q31 10.5 34 15.5 Q27.5 18 23 14.5 Z' fill='%23E8B583'/><circle cx='16.5' cy='22' r='2' fill='%235C4433'/><circle cx='27.5' cy='22' r='2' fill='%235C4433'/><path d='M20.4 27 L23.6 27 L22 29.6 Z' fill='%235C4433'/><g stroke='%235C4433' stroke-width='1.6' stroke-linecap='round'><path d='M3 20 L11 23'/><path d='M2 26 L11 26'/><path d='M3 32 L11 29'/><path d='M41 20 L33 23'/><path d='M42 26 L33 26'/><path d='M41 32 L33 29'/></g></svg>") center/contain no-repeat}
</style>
</head>
<body>
<main class="wrap">
  <p class="eyebrow">Play together · 4+ players · paper &amp; pencil</p>
  <h1>Draw &amp; Guess</h1>
  <p class="sub">Only the artist looks at the phone. Draw the word on paper — no letters, no numbers — while your team guesses.</p>

  <div class="chips" id="cats" role="group" aria-label="Choose categories"></div>

  <div class="word-card">
    <div id="cat">Ready?</div>
    <div id="word">Tap the button below</div>
  </div>

  <button class="btn" id="next">New word</button>
  <p class="hint">Easy rule of thumb: 60 seconds per drawing, one point per correct guess.</p>
</main>
<a href="../../index.html#games" style="position:fixed;left:16px;bottom:16px;z-index:99999;background:#FBF1E3;color:#5C4433;font:700 17px/1 'Baloo 2',Nunito,system-ui;padding:14px 20px;border:2px solid #C97B52;border-bottom-width:4px;border-radius:999px;text-decoration:none;min-height:48px;display:inline-flex;align-items:center">⌂ Lobby</a>

<script>
"use strict";
const WORDS = {
  "Objects": ["Glasses","Windmill","Lighthouse","Snowman","Anchor","Key","Bridge","Guitar","Clock","Kite","Tent","Crown","Envelope","Balloon","Cactus","Traffic light","Rainbow","Sailboat","Castle","Bicycle","Ladder","Campfire","Well","Fountain"],
  "Animals": ["Giraffe","Whale","Hedgehog","Spider","Swan","Lobster","Bat","Fox","Donkey","Jellyfish","Ant","Parrot","Seal","Goat","Moose","Octopus","Ladybug","Rabbit","Shark","Pig","Turkey","Snail","Deer","Duck"],
  "Food": ["Watermelon","Pretzel","Fried egg","Ice cream cone","Pineapple","Cheese","Pizza slice","Banana","Teacup","Birthday cake","Corn","Mushroom","Grapes","Hot dog","Doughnut","Pear","Carrot","Cherry","Bread loaf","Honey jar","Fish dinner","Apple pie","Lollipop","Onion"],
  "Places": ["Beach","Farm","Library","Circus","Desert island","Waterfall","Playground","Bakery","Harbor","Mountain cabin","Garden","Train station","Zoo","Airport","Campsite","Market","Museum","Swimming pool","Forest","Village"],
  "Tricky": ["Echo","Dream","Winter","Shadow","Whisper","Luck","Sunrise","Music","Sneeze","Gravity","Hiccup","Silence","Yawn","Heat","Memory","Fog","Applause","Dizzy","Smell","Patience"]
};
const cats = document.getElementById("cats");
const active = new Set(Object.keys(WORDS));
for (const name of Object.keys(WORDS)) {
  const b = document.createElement("button");
  b.className = "chip"; b.textContent = name; b.setAttribute("aria-pressed", "true");
  b.addEventListener("click", () => {
    const on = b.getAttribute("aria-pressed") === "true";
    if (on && active.size === 1) return;
    b.setAttribute("aria-pressed", String(!on));
    if (on) active.delete(name); else active.add(name);
  });
  cats.appendChild(b);
}
const wordEl = document.getElementById("word"), catEl = document.getElementById("cat");
let recent = [];
document.getElementById("next").addEventListener("click", () => {
  const pool = [];
  for (const c of active) for (const w of WORDS[c]) if (!recent.includes(w)) pool.push([c, w]);
  if (pool.length === 0) recent = [];
  const [c, w] = pool.length ? pool[Math.floor(Math.random() * pool.length)]
                             : [[...active][0], WORDS[[...active][0]][0]];
  recent.push(w); if (recent.length > 40) recent.shift();
  catEl.textContent = c; wordEl.textContent = w;
});
</script>
</body>
</html>
