<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bingo Caller — The Calm Corner</title>
<link rel="stylesheet" href="../../assets/fonts/fonts.css">
<link rel="stylesheet" href="../../assets/fonts/fonts-cute.css">
<style>
:root{
  /* Paper */
  --paper:#FBF1E3;
  --paper-deep:#F3E4CE;
  --card:#FFFDF7;
  --card-bevel:#E3D2B8;
  /* Ink */
  --ink:#5C4433;
  --ink-soft:#8A6F5C;
  --line:rgba(92,68,51,.14);
  /* Brand */
  --caramel:#C97B52;
  --caramel-deep:#9E5A38;
  --on-caramel:#FFF4EA;
  /* Page accent pair: sky */
  --sky:#CBDCEA; --sky-bv:#9FB6C9; --sky-ink:#2F4A61;

  --r-tile:20px; --r-ui:14px;
  --bevel:5px;
  --dur:260ms;
  --display:'Baloo 2', Nunito, "Segoe UI", system-ui, sans-serif;
  --sans:Nunito, "Segoe UI", system-ui, sans-serif;
}
*{box-sizing:border-box;margin:0}
body{
  background:var(--paper);
  color:var(--ink);
  font:400 20px/1.6 var(--sans);
  min-height:100vh;
}
.wrap{max-width:720px;margin:0 auto;padding:24px 24px 120px;text-align:center}
.eyebrow{display:inline-block;font:700 14px/1 var(--sans);color:var(--caramel);
  background:rgba(201,123,82,.14);padding:8px 16px;border-radius:999px}
h1{font-family:var(--display);font-weight:700;font-size:clamp(40px,9vw,76px);line-height:1.04;margin:12px 0 8px;color:var(--ink)}
.sub{color:var(--ink-soft);font-size:20px;max-width:50ch;margin:0 auto 22px}

.stage{position:relative;background:var(--card);border:2px solid var(--line);border-bottom:6px solid var(--card-bevel);border-radius:22px;
  padding:34px 24px;margin-bottom:18px;min-height:170px;display:flex;flex-direction:column;justify-content:center;gap:6px;color:var(--ink)}
#callLabel{color:var(--ink-soft);font-size:19px;font-weight:700}
#call{font-family:var(--display);font-weight:700;font-size:clamp(40px,9vw,64px);line-height:1;color:var(--ink)}
#callMeta{color:var(--ink-soft);font-size:19px;font-weight:600}

.controls{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;margin-bottom:26px}
.btn{display:inline-flex;align-items:center;justify-content:center;background:var(--caramel);color:var(--on-caramel);
  font:700 20px var(--sans);padding:16px 34px;min-height:56px;border-radius:999px;cursor:pointer;
  width:100%;max-width:360px;border:0;border-bottom:4px solid var(--caramel-deep)}
.ghost{display:inline-flex;align-items:center;justify-content:center;background:var(--paper);color:var(--ink);
  font:700 18px var(--sans);padding:12px 22px;min-height:48px;border-radius:999px;cursor:pointer;
  border:2px solid var(--caramel);border-bottom-width:4px}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn:focus-visible,.ghost:focus-visible,.num:focus-visible,a:focus-visible{outline:3px solid var(--caramel);outline-offset:3px}

.status{color:var(--ink-soft);font-size:19px;margin-bottom:22px}

.board{background:var(--paper-deep);border:2px solid var(--line);border-radius:22px;padding:14px;text-align:left}
.boardhead{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:8px}
.boardhead span{font-family:var(--display);font-weight:700;font-size:22px;text-align:center;color:var(--sky-ink)}
.boardgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.col{display:flex;flex-direction:column;gap:6px}
.num{position:relative;display:flex;align-items:center;justify-content:center;min-height:48px;
  font:700 18px var(--sans);color:var(--ink);border:2px solid var(--line);border-radius:999px;
  background:var(--card);cursor:default}
.num.called{background:var(--sky);border-color:var(--sky-bv);color:var(--sky-ink);font-weight:700;text-decoration:line-through;text-decoration-thickness:2px}

@media (prefers-reduced-motion:no-preference){
  @view-transition{navigation:auto}
  ::view-transition-old(root){animation:vt-out 200ms ease both}
  ::view-transition-new(root){animation:vt-in 260ms ease both}
  @keyframes vt-out{to{opacity:0;transform:translateY(8px)}}
  @keyframes vt-in{from{opacity:0;transform:translateY(-8px)}}
  .btn,.ghost{transition:transform var(--dur) cubic-bezier(.34,1.56,.64,1),border-bottom-width 120ms ease}
  .btn:hover:not(:disabled){transform:translateY(-2px);border-bottom-width:6px}
  .btn:active:not(:disabled){transform:translateY(2px);border-bottom-width:1px}
  .ghost:hover{transform:translateY(-2px)}
  .ghost:active{transform:translateY(2px);border-bottom-width:2px}
}
@media (max-width:480px){
  .boardhead span{font-size:18px}
}

.eyebrow{display:inline-flex;align-items:center;gap:9px}
.eyebrow::before{content:"";flex:none;width:26px;height:24px;background:url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 44 40'><g stroke='%235C4433' stroke-width='2.5' stroke-linejoin='round'><path d='M10 17 L5 4 L19 9 Z' fill='%23F6E7D3'/><path d='M34 17 L39 4 L25 9 Z' fill='%23F6E7D3'/></g><path d='M11 12.5 L8.5 6.5 L15 9 Z' fill='%23F5CCB5'/><path d='M33 12.5 L35.5 6.5 L29 9 Z' fill='%23F5CCB5'/><circle cx='22' cy='23' r='15' fill='%23F6E7D3' stroke='%235C4433' stroke-width='2.5'/><path d='M24 9.5 Q31 10.5 34 15.5 Q27.5 18 23 14.5 Z' fill='%23E8B583'/><circle cx='16.5' cy='22' r='2' fill='%235C4433'/><circle cx='27.5' cy='22' r='2' fill='%235C4433'/><path d='M20.4 27 L23.6 27 L22 29.6 Z' fill='%235C4433'/><g stroke='%235C4433' stroke-width='1.6' stroke-linecap='round'><path d='M3 20 L11 23'/><path d='M2 26 L11 26'/><path d='M3 32 L11 29'/><path d='M41 20 L33 23'/><path d='M42 26 L33 26'/><path d='M41 32 L33 29'/></g></svg>") center/contain no-repeat}
</style>
</head>
<body>
<main class="wrap">
  <p class="eyebrow">Play together · Host + any players · Paper cards</p>
  <h1>Bingo Caller</h1>
  <p class="sub">The host calls numbers aloud one at a time. Players mark matches on their paper cards — five in a row wins.</p>

  <div class="stage">
    <div id="callLabel">Current call</div>
    <div id="call">—</div>
    <div id="callMeta">Tap "Call next" to begin</div>
  </div>

  <div class="controls">
    <button class="btn" id="callNext">Call next</button>
  </div>
  <p class="status" id="status" aria-live="polite">0 of 75 numbers called</p>

  <div class="board" id="board" aria-label="All 75 bingo numbers, called numbers marked"></div>

  <div class="controls" style="margin-top:26px">
    <button class="ghost" id="reset">New game</button>
  </div>
</main>
<a href="../../index.html#games" data-lobby-fixed onclick="location.href='../../index.html#games'" ontouchend="event.preventDefault();event.stopPropagation();location.href='../../index.html#games'" style="position:fixed;left:16px;bottom:16px;z-index:99999;background:#FBF1E3;color:#5C4433;font:700 17px/1 'Baloo 2',Nunito,system-ui;padding:14px 20px;border:2px solid #C97B52;border-bottom-width:4px;border-radius:999px;text-decoration:none;min-height:48px;display:inline-flex;align-items:center">⌂ Lobby</a>

<script>
"use strict";
const LETTERS = ["B","I","N","G","O"];
const RANGES = [[1,15],[16,30],[31,45],[46,60],[61,75]];

const boardEl = document.getElementById("board");
const head = document.createElement("div");
head.className = "boardhead";
for (const l of LETTERS) {
  const s = document.createElement("span");
  s.textContent = l;
  head.appendChild(s);
}
boardEl.appendChild(head);

const grid = document.createElement("div");
grid.className = "boardgrid";
const cellByNumber = {};
for (let c = 0; c < 5; c++) {
  const col = document.createElement("div");
  col.className = "col";
  const [lo, hi] = RANGES[c];
  for (let n = lo; n <= hi; n++) {
    const cell = document.createElement("div");
    cell.className = "num";
    cell.textContent = String(n);
    col.appendChild(cell);
    cellByNumber[n] = cell;
  }
  grid.appendChild(col);
}
boardEl.appendChild(grid);

const callEl = document.getElementById("call"), callMetaEl = document.getElementById("callMeta");
const statusEl = document.getElementById("status");
const callNextBtn = document.getElementById("callNext");

let remaining = [];
let calledCount = 0;

function letterFor(n) {
  for (let i = 0; i < RANGES.length; i++) {
    if (n >= RANGES[i][0] && n <= RANGES[i][1]) return LETTERS[i];
  }
  return "";
}

function resetGame() {
  remaining = [];
  for (let n = 1; n <= 75; n++) remaining.push(n);
  calledCount = 0;
  for (const n in cellByNumber) cellByNumber[n].classList.remove("called");
  callEl.textContent = "—";
  callMetaEl.textContent = "Tap “Call next” to begin";
  statusEl.textContent = "0 of 75 numbers called";
  callNextBtn.disabled = false;
  callNextBtn.textContent = "Call next";
}

function callNextNumber() {
  if (remaining.length === 0) return;
  const idx = Math.floor(Math.random() * remaining.length);
  const n = remaining.splice(idx, 1)[0];
  calledCount++;
  const letter = letterFor(n);
  callEl.textContent = letter + "-" + n;
  callMetaEl.textContent = calledCount === 1 ? "First call" : "Call #" + calledCount;
  cellByNumber[n].classList.add("called");
  statusEl.textContent = calledCount + " of 75 numbers called";
  if (remaining.length === 0) {
    callNextBtn.disabled = true;
    callNextBtn.textContent = "All numbers called";
    callMetaEl.textContent = "Every number has been called";
  }
}

callNextBtn.addEventListener("click", callNextNumber);
document.getElementById("reset").addEventListener("click", () => {
  if (calledCount === 0 || confirm("Start a new game? This clears all called numbers.")) {
    resetGame();
  }
});

resetGame();
</script>
</body>
</html>
