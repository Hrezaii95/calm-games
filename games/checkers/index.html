<!doctype html>
<html>
<head>
  <title>HTML5 Checkers</title>
  <script src="vendor/js/jquery-2.1.3.min.js"></script>
  <link href="vendor/fonts/lato.css" rel="stylesheet">
  <link href="style.css" rel="stylesheet">
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
  <link rel="shortcut icon" href="favicon.png" type="image/x-icon">
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="icon" href="favicon.png" type="image/x-icon">
  <script src="script.js"></script>
  <style>@media (prefers-reduced-motion:no-preference){@view-transition{navigation:auto}}</style>
</head>
<body>
  <div class="column">
    <div class="info">
      <h1>Checkers</h1>
      <hr>
      <p>Made by codethejason for FOSSASIA 2015.</p>
    </div>
    <div class="stats">
      <h2>Game Statistics</h2>
      <div class="wrapper">
      <div id="player1">
        <h3>Player 1 (Top)</h3>
      </div>
      <div id="player2">
        <h3>Player 2 (Bottom)</h3>
      </div>
      </div>
      <div class="clearfix"></div>
      <div class="turn"></div>
      <span id="winner"></span>
      <button id="cleargame">Reset Game</button>
    </div>
  </div>
  <div class="column">
    <div id="board">
      <div class="tiles"></div>
      <div class="pieces">
        <div class="player1pieces">
        </div>
        <div class="player2pieces">
        </div>
      </div>
  </div>
</div>
<a href="../../index.html#games" style="position:fixed;left:16px;bottom:16px;z-index:99999;background:rgba(30,27,24,.92);color:#F0E9DE;font:700 17px/1 system-ui;padding:14px 18px;border-radius:999px;text-decoration:none;border:1.5px solid rgba(240,233,222,.34);min-height:48px;display:inline-flex;align-items:center">⌂ Lobby</a>
</body>
</html>
