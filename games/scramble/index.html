<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <meta name="description" content="An Animal Anagram Game" />
    <meta
      name="keywords"
      content="brain, train, animal, anagram, game, words, scramble, anagram, guessing, conundrum,"
    />
    <meta name="author" content="Jessica Clark" />
    <title>Animal Word Scramble</title>
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="assets/images/favicon/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="assets/images/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="assets/images/favicon-16x16.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="512x512"
      href="assets/images/favicon/android-chrome-512x512.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="assets/images/favicon/android-chrome-192x192.png"
    />
    <link rel="manifest" href="assets/images/favicon/site.webmanifest" />
    <link rel="stylesheet" href="assets/css/style.css" />
    <style>@media (prefers-reduced-motion:no-preference){@view-transition{navigation:auto}}</style>
  </head>

  <!-- The Javascript for this project is based on Udemy Tutorial by Laurence Svekis:
    "JavaScript Create 5 Fun Word Games".  The only html used from the course is:
    <"div id="game-area">. -->

  <body>
    <header></header>

    <main>
      <section class="game-play">
        <div id="game-area">
          <h1 id="heading-wordscramble">Animal Scramble</h1>
          <input
            type="text"
            class="input-text"
            id="input-word"
            name="inputtext"
            autocomplete="off"
            spellcheck="false"
            placeholder="Press Space to Skip"
            aria-label="Type word here"
            onkeypress="return (event.charCode > 64 && event.charCode < 91) || (event.charCode > 96 && event.charCode < 123)"
          />

          <div class="div-rules">
            <ul id="rules">
              <li class="list-intro">Unscramble the Animal!</li>
              <li class="list-intro">Press Space to Skip</li>
              <li class="list-intro">5 Turns then Play Again</li>
            </ul>
          </div>

          <!-- Code snippet to only allows letters in textbox from: 
https://www.includehelp.com/code-snippets/allow-only-alphabets-in-input-field-in-javascript.aspx -->
        </div>
      </section>
    </main>

    <script src="assets/js/script.js"></script>
    <a href="../../index.html#games" style="position:fixed;left:16px;bottom:16px;z-index:99999;background:rgba(30,27,24,.92);color:#F0E9DE;font:700 17px/1 system-ui;padding:14px 18px;border-radius:999px;text-decoration:none;border:1.5px solid rgba(240,233,222,.34);min-height:48px;display:inline-flex;align-items:center">⌂ Lobby</a>
  </body>
</html>
