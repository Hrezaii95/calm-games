<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Charades — The Calm Corner</title>
<link rel="stylesheet" href="../../assets/fonts/fonts.css">
<link rel="stylesheet" href="../../assets/fonts/fonts-cute.css">
<style>
:root{
  --paper:#FBF1E3;
  --paper-deep:#F3E4CE;
  --card:#FFFDF7;
  --ink:#5C4433;
  --ink-soft:#8A6F5C;
  --line:rgba(92,68,51,.14);
  --caramel:#C97B52;
  --caramel-deep:#9E5A38;
  --on-caramel:#FFF4EA;
  --peach:#F5CCB5; --peach-bv:#D6A184; --peach-ink:#7E3F20;
  --r-tile:20px; --r-ui:14px;
  --bevel:5px;
  --dur:260ms;
  --display:'Baloo 2', Nunito, "Segoe UI", system-ui, sans-serif;
  --sans:Nunito, "Segoe UI", system-ui, sans-serif;
}
*{box-sizing:border-box;margin:0}
body{
  background:var(--paper);
  color:var(--ink);
  font:400 20px/1.6 var(--sans);
  min-height:100vh;
}
.wrap{max-width:720px;margin:0 auto;padding:24px 24px 120px;text-align:center}
.eyebrow{display:inline-flex;align-items:center;gap:9px;font:700 14px/1 var(--sans);color:var(--caramel);
  background:rgba(201,123,82,.14);border-radius:999px;padding:9px 16px}
.eyebrow::before{content:"";flex:none;width:26px;height:24px;background:url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 44 40'><g stroke='%235C4433' stroke-width='2.5' stroke-linejoin='round'><path d='M10 17 L5 4 L19 9 Z' fill='%23F6E7D3'/><path d='M34 17 L39 4 L25 9 Z' fill='%23F6E7D3'/></g><path d='M11 12.5 L8.5 6.5 L15 9 Z' fill='%23F5CCB5'/><path d='M33 12.5 L35.5 6.5 L29 9 Z' fill='%23F5CCB5'/><circle cx='22' cy='23' r='15' fill='%23F6E7D3' stroke='%235C4433' stroke-width='2.5'/><path d='M24 9.5 Q31 10.5 34 15.5 Q27.5 18 23 14.5 Z' fill='%23E8B583'/><circle cx='16.5' cy='22' r='2' fill='%235C4433'/><circle cx='27.5' cy='22' r='2' fill='%235C4433'/><path d='M20.4 27 L23.6 27 L22 29.6 Z' fill='%235C4433'/><g stroke='%235C4433' stroke-width='1.6' stroke-linecap='round'><path d='M3 20 L11 23'/><path d='M2 26 L11 26'/><path d='M3 32 L11 29'/><path d='M41 20 L33 23'/><path d='M42 26 L33 26'/><path d='M41 32 L33 29'/></g></svg>") center/contain no-repeat}
h1{font-family:var(--display);font-weight:700;font-size:clamp(40px,9vw,76px);line-height:1.04;margin:12px 0 8px;color:var(--ink)}
.sub{color:var(--ink-soft);font-size:20px;max-width:44ch;margin:0 auto 26px}
.chips{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-bottom:26px}
.chip{font:700 18px var(--sans);color:var(--ink);background:var(--card);border:2px solid var(--line);
  border-radius:999px;padding:11px 20px;min-height:48px;cursor:pointer}
.chip:hover{border-color:var(--peach-bv)}
.chip[aria-pressed="true"]{background:var(--caramel);border-color:var(--caramel);color:var(--on-caramel);font-weight:700}
.chip:focus-visible,.btn:focus-visible,.ghost:focus-visible,a:focus-visible{outline:3px solid var(--caramel);outline-offset:3px}
.word-card{position:relative;background:var(--card);border:2px solid var(--line);border-bottom:6px solid #E3D2B8;border-radius:22px;
  padding:56px 24px;margin-bottom:22px;min-height:220px;display:flex;flex-direction:column;justify-content:center;gap:10px;color:var(--ink)}
#word{font-family:var(--display);font-weight:700;font-size:clamp(40px,9vw,64px);line-height:1.1;color:var(--ink)}
#cat{width:fit-content;margin:0 auto;background:var(--peach);color:var(--peach-ink);font-size:19px;font-weight:700;
  border:2px solid var(--peach-bv);border-radius:999px;padding:6px 16px}
.btn{display:inline-block;background:var(--caramel);color:var(--on-caramel);font:700 20px var(--sans);
  padding:16px 34px;min-height:56px;border-radius:999px;cursor:pointer;width:100%;max-width:360px;
  border:0;border-bottom:4px solid var(--caramel-deep)}
.ghost{background:var(--paper);border:2px solid var(--caramel);color:var(--ink);font:700 18px var(--sans);
  padding:12px 22px;min-height:48px;border-radius:999px;cursor:pointer;margin-top:14px}
.ghost:hover{background:rgba(201,123,82,.12)}
.ghost[aria-pressed="true"]{background:var(--peach);border-color:var(--peach-bv);color:var(--peach-ink)}
#timer{font-family:var(--display);font-weight:700;font-size:44px;color:var(--peach-ink);min-height:52px;margin-top:10px}
@media (prefers-reduced-motion:no-preference){
  .chip,.btn,.ghost{transition:transform var(--dur) cubic-bezier(.34,1.56,.64,1),border-bottom-width 120ms ease,background 160ms ease,border-color 160ms ease,color 160ms ease}
  .chip:hover,.btn:hover,.ghost:hover{transform:translateY(-2px)}
  .btn:active{transform:translateY(2px);border-bottom-width:1px}
  .chip:active,.ghost:active{transform:translateY(2px)}
  @view-transition{navigation:auto}
  ::view-transition-old(root){animation:vt-out 200ms ease both}
  ::view-transition-new(root){animation:vt-in 260ms ease both}
  @keyframes vt-out{to{opacity:0;transform:translateY(8px)}}
  @keyframes vt-in{from{opacity:0;transform:translateY(-8px)}}
}
</style>
</head>
<body>
<main class="wrap">
  <p class="eyebrow">Play together · 4+ players</p>
  <h1>Charades</h1>
  <p class="sub">Tap for a word, then act it out — no talking, no pointing at objects. Your team guesses.</p>

  <div class="chips" id="cats" role="group" aria-label="Choose categories"></div>

  <div class="word-card">
    <div id="cat">Ready?</div>
    <div id="word">Tap the button below</div>
    <div id="timer" aria-live="polite"></div>
  </div>

  <button class="btn" id="next">New word</button><br>
  <button class="ghost" id="timerToggle" aria-pressed="false">Timer: off</button>
</main>
<a href="../../index.html#games" data-lobby-fixed onclick="location.href='../../index.html#games'" ontouchend="event.preventDefault();event.stopPropagation();location.href='../../index.html#games'" style="position:fixed;left:16px;bottom:16px;z-index:99999;background:#FBF1E3;color:#5C4433;font:700 17px/1 'Baloo 2',Nunito,system-ui;padding:14px 20px;border:2px solid #C97B52;border-bottom-width:4px;border-radius:999px;text-decoration:none;min-height:48px;display:inline-flex;align-items:center">⌂ Lobby</a>

<script>
"use strict";
const WORDS = {
  "Actions": ["Fishing","Swimming","Knitting","Painting a wall","Riding a bicycle","Making tea","Sneezing","Shoveling snow","Taking a photo","Ironing a shirt","Rowing a boat","Planting flowers","Washing dishes","Playing piano","Blowing out candles","Walking a dog","Wrapping a gift","Hanging laundry","Directing traffic","Milking a cow","Juggling","Climbing a ladder","Sweeping the floor","Whistling"],
  "Animals": ["Elephant","Penguin","Kangaroo","Turtle","Rooster","Butterfly","Crab","Owl","Gorilla","Snake","Flamingo","Squirrel","Camel","Frog","Peacock","Woodpecker","Sloth","Dolphin","Bee","Ostrich","Cat","Horse","Chicken","Mouse"],
  "Jobs": ["Dentist","Barber","Firefighter","Chef","Photographer","Orchestra conductor","Waiter","Farmer","Pilot","Tailor","Fisherman","Painter","Teacher","Surgeon","Mail carrier","Carpenter","Traffic officer","Baker","Shepherd","Magician","Librarian","Mechanic","Gardener","Referee"],
  "Objects": ["Umbrella","Rocking chair","Telescope","Vacuum cleaner","Typewriter","Wheelbarrow","Alarm clock","Teapot","Ladder","Accordion","Fan","Mirror","Scissors","Candle","Broom","Kettle","Hammock","Binoculars","Suitcase","Lawn mower","Toothbrush","Pillow","Watering can","Slippers"],
  "Sports": ["Golf","Bowling","Table tennis","Archery","Weightlifting","Skiing","Fencing","Basketball","Swimming race","Boxing","Horse riding","Volleyball","Darts","Gymnastics","Ice skating","Tug of war","Cycling race","High jump","Rowing","Karate","Tennis","Football","Chess match","Marathon"]
};
const cats = document.getElementById("cats");
const active = new Set(Object.keys(WORDS));
for (const name of Object.keys(WORDS)) {
  const b = document.createElement("button");
  b.className = "chip"; b.textContent = name; b.setAttribute("aria-pressed", "true");
  b.addEventListener("click", () => {
    const on = b.getAttribute("aria-pressed") === "true";
    if (on && active.size === 1) return;               // keep at least one category
    b.setAttribute("aria-pressed", String(!on));
    if (on) active.delete(name); else active.add(name);
  });
  cats.appendChild(b);
}

const wordEl = document.getElementById("word"), catEl = document.getElementById("cat");
let recent = [];
function newWord() {
  const pool = [];
  for (const c of active) for (const w of WORDS[c]) if (!recent.includes(w)) pool.push([c, w]);
  if (pool.length === 0) recent = [];                   // all words used — start over
  const [c, w] = pool.length ? pool[Math.floor(Math.random() * pool.length)]
                             : [[...active][0], WORDS[[...active][0]][0]];
  recent.push(w); if (recent.length > 40) recent.shift();
  catEl.textContent = c; wordEl.textContent = w;
  if (timerOn) startTimer();
}
document.getElementById("next").addEventListener("click", newWord);

const timerEl = document.getElementById("timer"), toggle = document.getElementById("timerToggle");
let timerOn = false, tick = null;
const TIMER_SECONDS = 90;
function stopTimer(){ clearInterval(tick); tick = null; timerEl.textContent = ""; }
function startTimer(){
  stopTimer();
  let left = TIMER_SECONDS;
  timerEl.textContent = left + "s";
  tick = setInterval(() => {
    left--;
    timerEl.textContent = left > 0 ? left + "s" : "Time!";
    if (left <= 0) clearInterval(tick);
  }, 1000);
}
toggle.addEventListener("click", () => {
  timerOn = !timerOn;
  toggle.textContent = "Timer: " + (timerOn ? TIMER_SECONDS + "s" : "off");
  toggle.setAttribute("aria-pressed", String(timerOn));
  if (!timerOn) stopTimer();
});
</script>
</body>
</html>
